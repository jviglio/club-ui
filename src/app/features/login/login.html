<div class="login-container">
  <div class="login-card">
    <h2>Agente Inmobiliario IA</h2>

    <form (ngSubmit)="login()">
      <input 
        type="text"
        placeholder="Usuario"
        [(ngModel)]="username"
        name="username"
        required
      />

      <input 
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p *ngIf="error" class="error">{{ error }}</p>
  </div>
</div>
