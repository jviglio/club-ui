<div class="home-container">
  <header class="site-header">
    <div class="brand-block">
      <span class="brand-mark" aria-hidden="true">AI</span>
      <div class="brand-text">
        <strong>Agente Inmobiliario</strong>
        <small>Servicios inmobiliarios</small>
      </div>
    </div>

    <nav class="site-nav" aria-label="Menu principal">
      <button type="button">Inicio</button>
      <button type="button">Contacto</button>
    </nav>
  </header>

  <div class="chat-card">
    <div class="chat-header">
      <span>Asistente inteligente inmobiliario</span>
    </div>

    <div class="chat-messages" #chatMessages>
      <div *ngFor="let msg of messages"
           [ngClass]="msg.role">

        <div class="bubble">
          <div [innerHTML]="msg.content"></div>
        </div>

      </div>

      <div *ngIf="loading" class="ai">
        <div class="bubble typing">Escribiendo...</div>
      </div>
    </div>

    <form class="chat-input" (ngSubmit)="sendMessage()">
      <textarea
        [(ngModel)]="text"
        name="text"
        rows="2"
        placeholder="Escribi tu consulta..."
        required>
      </textarea>

      <button type="submit" [disabled]="loading">
        Enviar
      </button>
    </form>

  </div>
</div>
